name: Build and Push Multi-Arch Docker Image

on:
  push:
    tags:
      - "v*"

jobs:
  build-arch:
    name: Build ${{ matrix.suffix }}
    runs-on: ubuntu-latest

    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            suffix: amd64
          - platform: linux/arm64
            suffix: arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image name
        shell: bash
        run: |
          echo "IMAGE_NAME=${{ secrets.DOCKERHUB_USERNAME }}/wechat-knowledge-base" >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: ${{ matrix.platform }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.ref_name }}-${{ matrix.suffix }}
            ${{ env.IMAGE_NAME }}:latest-${{ matrix.suffix }}
          cache-from: type=gha,scope=${{ matrix.suffix }}
          cache-to: type=gha,mode=max,scope=${{ matrix.suffix }}
          provenance: false

  create-manifest:
    name: Create multi-arch manifest
    runs-on: ubuntu-latest
    needs: build-arch

    permissions:
      contents: read

    steps:
      - name: Set image name
        shell: bash
        run: |
          echo "IMAGE_NAME=${{ secrets.DOCKERHUB_USERNAME }}/wechat-knowledge-base" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create version manifest
        shell: bash
        run: |
          docker buildx imagetools create \
            -t "$IMAGE_NAME:${GITHUB_REF_NAME}" \
            "$IMAGE_NAME:${GITHUB_REF_NAME}-amd64" \
            "$IMAGE_NAME:${GITHUB_REF_NAME}-arm64"

      - name: Create latest manifest
        shell: bash
        run: |
          docker buildx imagetools create \
            -t "$IMAGE_NAME:latest" \
            "$IMAGE_NAME:latest-amd64" \
            "$IMAGE_NAME:latest-arm64"