<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>微信公众号知识演化系统</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .fade-in { animation: fadeIn 0.3s ease-in; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    .toast { position: fixed; top: 20px; right: 20px; z-index: 1000; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <!-- Toast 通知 -->
  <div id="toast" class="toast hidden"></div>

  <div class="max-w-5xl mx-auto px-4 py-8">
    <!-- 标题 -->
    <header class="mb-8">
      <h1 class="text-3xl font-bold text-gray-800">微信公众号知识演化系统</h1>
      <p class="text-gray-500 mt-1">定时采集 · 多Agent分析 · 知识演化</p>
      <div class="flex items-center gap-2 mt-2">
        <span id="healthDot" class="w-2.5 h-2.5 rounded-full bg-gray-400"></span>
        <span id="healthText" class="text-sm text-gray-500">检测中...</span>
      </div>
    </header>

    <!-- 快速爬取 -->
    <section class="bg-white rounded-xl shadow-sm border p-6 mb-6 fade-in">
      <h2 class="text-lg font-semibold mb-4 flex items-center gap-2">
        <svg class="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
        快速爬取
      </h2>
      <p class="text-sm text-gray-500 mb-3">输入链接立即爬取（走完整管线），不创建定时任务。每行一个链接。</p>
      <textarea id="quickUrls" rows="3" placeholder="https://mp.weixin.qq.com/s/xxxxx&#10;https://mp.weixin.qq.com/s/yyyyy"
        class="w-full border rounded-lg p-3 text-sm focus:ring-2 focus:ring-blue-400 focus:border-transparent resize-y"></textarea>
      <button onclick="quickCrawl()" class="mt-3 bg-blue-600 text-white px-5 py-2 rounded-lg text-sm font-medium hover:bg-blue-700 transition">
        立即爬取
      </button>
    </section>

    <!-- 创建定时任务 -->
    <section class="bg-white rounded-xl shadow-sm border p-6 mb-6 fade-in">
      <h2 class="text-lg font-semibold mb-4 flex items-center gap-2">
        <svg class="w-5 h-5 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        创建定时任务
      </h2>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
        <div class="md:col-span-1">
          <label class="block text-sm font-medium text-gray-700 mb-1">采集间隔</label>
          <div class="flex items-center gap-2">
            <input id="intervalHours" type="number" min="0.1" step="0.1" value="24" 
              class="w-full border rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-green-400 focus:border-transparent">
            <span class="text-sm text-gray-500 whitespace-nowrap">小时</span>
          </div>
          <div class="flex flex-wrap gap-1.5 mt-2">
            <button onclick="setInterval(1)" class="text-xs bg-gray-100 hover:bg-gray-200 px-2 py-1 rounded">1h</button>
            <button onclick="setInterval(6)" class="text-xs bg-gray-100 hover:bg-gray-200 px-2 py-1 rounded">6h</button>
            <button onclick="setInterval(12)" class="text-xs bg-gray-100 hover:bg-gray-200 px-2 py-1 rounded">12h</button>
            <button onclick="setInterval(24)" class="text-xs bg-gray-100 hover:bg-gray-200 px-2 py-1 rounded">24h</button>
            <button onclick="setInterval(168)" class="text-xs bg-gray-100 hover:bg-gray-200 px-2 py-1 rounded">7天</button>
          </div>
        </div>
        <div class="md:col-span-2">
          <label class="block text-sm font-medium text-gray-700 mb-1">爬取链接（每行一个）</label>
          <textarea id="taskUrls" rows="4" placeholder="https://mp.weixin.qq.com/s/xxxxx&#10;https://mp.weixin.qq.com/s/yyyyy"
            class="w-full border rounded-lg p-3 text-sm focus:ring-2 focus:ring-green-400 focus:border-transparent resize-y"></textarea>
        </div>
      </div>
      <button onclick="createScheduledTask()" class="bg-green-600 text-white px-5 py-2 rounded-lg text-sm font-medium hover:bg-green-700 transition">
        创建定时任务
      </button>
    </section>

    <!-- 定时任务列表 -->
    <section class="bg-white rounded-xl shadow-sm border p-6 mb-6 fade-in">
      <h2 class="text-lg font-semibold mb-4 flex items-center gap-2">
        <svg class="w-5 h-5 text-purple-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"/></svg>
        定时任务列表
      </h2>
      <div id="taskList" class="space-y-3">
        <p class="text-gray-400 text-sm">加载中...</p>
      </div>
    </section>

    <!-- 执行历史 -->
    <section class="bg-white rounded-xl shadow-sm border p-6 fade-in">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-semibold flex items-center gap-2">
          <svg class="w-5 h-5 text-orange-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
          执行历史
        </h2>
        <button onclick="loadHistory()" class="text-sm text-blue-600 hover:underline">刷新</button>
      </div>
      <div id="historyList" class="space-y-2 max-h-96 overflow-y-auto">
        <p class="text-gray-400 text-sm">加载中...</p>
      </div>
    </section>
  </div>

<script>
const API = '';

// ===== 工具函数 =====
function showToast(msg, type = 'success') {
  const el = document.getElementById('toast');
  const colors = { success: 'bg-green-500', error: 'bg-red-500', info: 'bg-blue-500' };
  el.className = `toast ${colors[type] || colors.info} text-white px-4 py-2.5 rounded-lg shadow-lg text-sm fade-in`;
  el.textContent = msg;
  el.classList.remove('hidden');
  setTimeout(() => el.classList.add('hidden'), 3000);
}

async function api(path, opts = {}) {
  const res = await fetch(API + path, {
    headers: { 'Content-Type': 'application/json' },
    ...opts,
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || '请求失败');
  return data;
}

function formatTime(iso) {
  if (!iso) return '-';
  const d = new Date(iso);
  return d.toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
}

function setIntervalVal(h) {
  document.getElementById('intervalHours').value = h;
}

// ===== 健康检查 =====
async function checkHealth() {
  try {
    const data = await api('/api/health');
    document.getElementById('healthDot').className = 'w-2.5 h-2.5 rounded-full bg-green-500';
    document.getElementById('healthText').textContent =
      `运行中 · 活跃任务 ${data.activeTasks} · 已运行 ${Math.floor(data.uptime / 3600)}h${Math.floor((data.uptime % 3600) / 60)}m`;
  } catch {
    document.getElementById('healthDot').className = 'w-2.5 h-2.5 rounded-full bg-red-500';
    document.getElementById('healthText').textContent = '连接失败';
  }
}

// ===== 快速爬取 =====
async function quickCrawl() {
  const urls = document.getElementById('quickUrls').value.split('\n').map(u => u.trim()).filter(Boolean);
  if (urls.length === 0) return showToast('请输入至少一个链接', 'error');

  try {
    const data = await api('/api/crawl', { method: 'POST', body: { urls } });
    showToast(data.message);
    document.getElementById('quickUrls').value = '';
    setTimeout(loadHistory, 2000);
  } catch (e) {
    showToast(e.message, 'error');
  }
}

// ===== 创建定时任务 =====
async function createScheduledTask() {
  const urls = document.getElementById('taskUrls').value.split('\n').map(u => u.trim()).filter(Boolean);
  const intervalHours = parseFloat(document.getElementById('intervalHours').value);

  if (urls.length === 0) return showToast('请输入至少一个链接', 'error');
  if (!intervalHours || intervalHours < 0.1) return showToast('间隔最少 0.1 小时', 'error');

  try {
    await api('/api/tasks', { method: 'POST', body: { urls, intervalHours } });
    showToast('定时任务已创建');
    document.getElementById('taskUrls').value = '';
    loadTasks();
  } catch (e) {
    showToast(e.message, 'error');
  }
}

// ===== 任务列表 =====
async function loadTasks() {
  try {
    const { tasks } = await api('/api/tasks');
    const container = document.getElementById('taskList');

    if (tasks.length === 0) {
      container.innerHTML = '<p class="text-gray-400 text-sm">暂无定时任务</p>';
      return;
    }

    container.innerHTML = tasks.map(t => `
      <div class="border rounded-lg p-4 ${t.enabled ? 'border-green-200 bg-green-50/30' : 'border-gray-200 bg-gray-50/50'}">
        <div class="flex items-start justify-between gap-4">
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2 mb-1">
              <span class="inline-block w-2 h-2 rounded-full ${t.enabled ? 'bg-green-500' : 'bg-gray-400'}"></span>
              <span class="text-sm font-medium text-gray-700">每 ${t.intervalHours} 小时</span>
              <span class="text-xs text-gray-400">${t.urls.length} 个链接</span>
            </div>
            <div class="text-xs text-gray-500 space-y-0.5">
              <div>上次执行: ${formatTime(t.lastRunAt)}</div>
              <div>下次执行: ${formatTime(t.nextRunAt)}</div>
              <details class="mt-1">
                <summary class="cursor-pointer text-blue-500 hover:underline">查看链接</summary>
                <ul class="mt-1 ml-2 space-y-0.5">${t.urls.map(u => `<li class="truncate" title="${u}">${u}</li>`).join('')}</ul>
              </details>
            </div>
          </div>
          <div class="flex items-center gap-1.5 shrink-0">
            <button onclick="runNow('${t.id}')" class="text-xs bg-blue-100 text-blue-700 hover:bg-blue-200 px-2.5 py-1.5 rounded transition" title="立即执行">
              ▶ 执行
            </button>
            <button onclick="toggleTask('${t.id}', ${!t.enabled})" class="text-xs ${t.enabled ? 'bg-yellow-100 text-yellow-700 hover:bg-yellow-200' : 'bg-green-100 text-green-700 hover:bg-green-200'} px-2.5 py-1.5 rounded transition">
              ${t.enabled ? '⏸ 暂停' : '▶ 启用'}
            </button>
            <button onclick="removeTask('${t.id}')" class="text-xs bg-red-100 text-red-700 hover:bg-red-200 px-2.5 py-1.5 rounded transition" title="删除">
              ✕
            </button>
          </div>
        </div>
      </div>
    `).join('');
  } catch {
    document.getElementById('taskList').innerHTML = '<p class="text-red-400 text-sm">加载失败</p>';
  }
}

// ===== 任务操作 =====
async function toggleTask(id, enabled) {
  try {
    await api(`/api/tasks/${id}`, { method: 'PUT', body: { enabled } });
    showToast(enabled ? '任务已启用' : '任务已暂停');
    loadTasks();
  } catch (e) { showToast(e.message, 'error'); }
}

async function removeTask(id) {
  if (!confirm('确定删除该定时任务？')) return;
  try {
    await api(`/api/tasks/${id}`, { method: 'DELETE' });
    showToast('任务已删除');
    loadTasks();
  } catch (e) { showToast(e.message, 'error'); }
}

async function runNow(id) {
  try {
    const data = await api(`/api/tasks/${id}/run`, { method: 'POST' });
    showToast(data.message);
    setTimeout(loadHistory, 3000);
  } catch (e) { showToast(e.message, 'error'); }
}

// ===== 执行历史 =====
async function loadHistory() {
  try {
    const { history } = await api('/api/history');
    const container = document.getElementById('historyList');

    if (history.length === 0) {
      container.innerHTML = '<p class="text-gray-400 text-sm">暂无执行记录</p>';
      return;
    }

    container.innerHTML = history.map(h => {
      const statusMap = {
        running: '<span class="text-blue-600 bg-blue-50 px-2 py-0.5 rounded text-xs">运行中</span>',
        success: '<span class="text-green-600 bg-green-50 px-2 py-0.5 rounded text-xs">成功</span>',
        failed: '<span class="text-red-600 bg-red-50 px-2 py-0.5 rounded text-xs">失败</span>',
      };
      return `
        <div class="flex items-center gap-3 text-sm py-2 border-b border-gray-100 last:border-0">
          ${statusMap[h.status] || ''}
          <span class="flex-1 truncate text-gray-600" title="${h.url}">${h.url}</span>
          <span class="text-xs text-gray-400 whitespace-nowrap">${formatTime(h.startedAt)}</span>
          ${h.error ? `<span class="text-xs text-red-400 truncate max-w-32" title="${h.error}">${h.error}</span>` : ''}
        </div>
      `;
    }).join('');
  } catch {
    document.getElementById('historyList').innerHTML = '<p class="text-red-400 text-sm">加载失败</p>';
  }
}

// ===== 初始化 =====
checkHealth();
loadTasks();
loadHistory();
setInterval(checkHealth, 30000);
setInterval(loadTasks, 15000);
setInterval(loadHistory, 10000);
</script>
</body>
</html>
