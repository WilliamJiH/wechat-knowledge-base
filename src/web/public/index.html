<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>微信知识库 · 管理界面</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Noto Sans SC"', 'sans-serif'],
            mono: ['"Courier New"', '"Noto Sans SC"', 'monospace'],
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: "Noto Sans SC", sans-serif; }
    .tab-active { border-bottom: 2px solid #2563eb; color: #2563eb; font-weight: 600; }
    textarea.mono { font-family: "Courier New", "Noto Sans SC", monospace; font-size: 13px; }
    .spinner {
      border: 3px solid #e5e7eb;
      border-top-color: #2563eb;
      border-radius: 50%;
      width: 16px; height: 16px;
      animation: spin 0.7s linear infinite;
      display: inline-block; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .chip { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 9999px; }
    .chip-gray   { background: #f3f4f6; color: #9ca3af; }
    .chip-blue   { background: #dbeafe; color: #1d4ed8; }
    .chip-green  { background: #dcfce7; color: #15803d; }
    .chip-red    { background: #fee2e2; color: #dc2626; }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen">

<!-- 顶栏 -->
<header class="bg-white border-b px-6 py-3 flex items-center justify-between shadow-sm sticky top-0 z-10">
  <div class="flex items-center gap-3">
    <span class="text-lg font-bold text-blue-600">微信知识库</span>
    <span id="healthBadge" class="text-xs px-2 py-0.5 rounded-full bg-gray-100 text-gray-400">连接中...</span>
  </div>
  <nav class="flex">
    <button onclick="showTab('wechat')" id="tab-wechat" class="tab-btn px-4 py-2.5 text-sm text-gray-500 tab-active">微信订阅</button>
    <button onclick="showTab('history')" id="tab-history" class="tab-btn px-4 py-2.5 text-sm text-gray-500">执行历史</button>
    <button onclick="showTab('prompts')" id="tab-prompts" class="tab-btn px-4 py-2.5 text-sm text-gray-500">Agent Prompts</button>
  </nav>
</header>

<main class="max-w-4xl mx-auto px-4 py-6 space-y-4">

  <!-- ===== 快速爬取 ===== -->
  

  <!-- ===== 定时任务 ===== -->
  

  <!-- ===== 执行历史 ===== -->
  <section id="pane-history" class="hidden">
    <div class="bg-white rounded-xl shadow-sm border p-6">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-base font-semibold"> 执行历史</h2>
        <button onclick="loadHistory()" class="text-xs text-blue-500 hover:underline">刷新</button>
      </div>
      <div id="historyList" class="space-y-1.5 text-sm text-gray-400 max-h-[60vh] overflow-y-auto">加载中...</div>
    </div>
  </section>

  <section id="pane-wechat" class="space-y-4">
    <div class="bg-white rounded-xl shadow-sm border p-6">
      <div class="flex items-center justify-between gap-4 mb-4">
        <div>
          <h2 class="text-base font-semibold">微信公众平台授权</h2>
          <p id="wechatStatus" class="text-sm text-gray-400 mt-1">正在读取状态...</p>
        </div>
        <button onclick="startWechatLogin()" id="wechatLoginBtn"
          class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 disabled:opacity-50 transition">
          生成登录二维码
        </button>
      </div>
      <div id="wechatQrBox" class="hidden flex items-center gap-4 border rounded-lg p-4 bg-gray-50">
        <img id="wechatQrImage" class="w-44 h-44 bg-white border rounded-lg object-contain" alt="微信登录二维码" />
        <div class="text-sm text-gray-500">
          <p class="font-medium text-gray-700 mb-1">请使用微信扫码并在手机上确认登录。</p>
          <p>扫码成功后页面会自动更新登录状态。</p>
          <p id="wechatLoginError" class="text-red-500 mt-2"></p>
        </div>
      </div>
    </div>

    <div class="bg-white rounded-xl shadow-sm border p-6">
      <h2 class="text-base font-semibold mb-4">搜索并订阅公众号</h2>
      <div class="flex gap-2">
        <input id="wechatKeyword" class="flex-1 border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-400 focus:outline-none"
          placeholder="输入公众号名称或关键词" />
        <button onclick="searchWechatBizUi()" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm hover:bg-blue-700 transition">搜索</button>
      </div>
      <div id="wechatSearchResults" class="mt-4 space-y-2 text-sm text-gray-400"></div>
    </div>

    <div class="bg-white rounded-xl shadow-sm border p-6">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-base font-semibold">已订阅公众号</h2>
        <div class="flex items-center gap-2">
          <input id="wechatSyncCount" type="number" value="5" min="1" max="20"
            class="w-20 border rounded-lg px-2 py-1.5 text-sm" />
          <button onclick="syncWechatSubscriptions(true)" class="px-3 py-1.5 bg-gray-100 text-gray-700 rounded-lg text-sm hover:bg-gray-200 transition">只取链接</button>
          <button onclick="syncWechatSubscriptions(false)" class="px-3 py-1.5 bg-green-600 text-white rounded-lg text-sm hover:bg-green-700 transition">同步入库</button>
        </div>
      </div>
      <div id="wechatSubscriptions" class="space-y-2 text-sm text-gray-400"></div>
      <div id="wechatSyncResults" class="mt-4 border-t pt-4 hidden">
        <h3 class="text-sm font-semibold text-gray-700 mb-2">同步结果</h3>
        <div id="wechatSyncList" class="space-y-2 text-xs"></div>
      </div>
    </div>
  
<div id="wechatTaskPanel" class="space-y-4">
    <!-- 创建表单 -->
    <div class="bg-white rounded-xl shadow-sm border p-6">
      <h2 class="text-base font-semibold mb-4"> 创建定时任务</h2>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-xs text-gray-500 mb-1">采集间隔（小时）</label>
          <input type="number" id="newInterval" value="6" min="0.1" step="0.5"
            class="w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-400 focus:outline-none" />
          <div class="flex gap-1.5 mt-2 flex-wrap">
            <button onclick="setIntervalVal(1)"   class="text-xs px-2.5 py-1 bg-gray-100 rounded hover:bg-blue-100 transition">1h</button>
            <button onclick="setIntervalVal(6)"   class="text-xs px-2.5 py-1 bg-gray-100 rounded hover:bg-blue-100 transition">6h</button>
            <button onclick="setIntervalVal(12)"  class="text-xs px-2.5 py-1 bg-gray-100 rounded hover:bg-blue-100 transition">12h</button>
            <button onclick="setIntervalVal(24)"  class="text-xs px-2.5 py-1 bg-gray-100 rounded hover:bg-blue-100 transition">24h</button>
            <button onclick="setIntervalVal(168)" class="text-xs px-2.5 py-1 bg-gray-100 rounded hover:bg-blue-100 transition">7天</button>
          </div>
        </div>
        <div>
          <label class="block text-xs text-gray-500 mb-1">链接列表（每行一个）</label>
          <textarea id="newUrls" rows="4" placeholder="https://mp.weixin.qq.com/s/xxxxx"
            class="mono w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-400 focus:outline-none resize-y bg-gray-50"></textarea>
        </div>
      </div>
      <button onclick="createTask()"
        class="mt-4 px-5 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 transition">
         创建任务
      </button>
    </div>

    <!-- 任务列表 -->
    <div class="bg-white rounded-xl shadow-sm border p-6">
      <div class="flex items-center justify-between mb-4">
        <h3 class="text-sm font-semibold text-gray-700">任务列表</h3>
        <button onclick="loadTasks()" class="text-xs text-blue-500 hover:underline">刷新</button>
      </div>
      <div id="taskList" class="space-y-3 text-sm text-gray-400">加载中...</div>
    </div>
  </div>
</section>

  <!-- ===== Agent Prompts ===== -->
  <section id="pane-prompts" class="hidden">
    <div class="bg-white rounded-xl shadow-sm border p-6">
      <h2 class="text-base font-semibold mb-1"> Agent Prompt 管理</h2>
      <p class="text-sm text-gray-400 mb-5">修改每个 Agent 的 System Prompt，保存后立即生效（下次爬取时使用）</p>
      <div id="promptList" class="space-y-6 text-sm text-gray-400">加载中...</div>
    </div>
  </section>

</main>

<script>
// =================== 全局 ===================
const API = '';
const TABS = ['wechat','history','prompts'];

function showTab(tab) {
  TABS.forEach(t => {
    document.getElementById(`pane-${t}`).classList.toggle('hidden', t !== tab);
    const btn = document.getElementById(`tab-${t}`);
    btn.classList.toggle('tab-active', t === tab);
    btn.classList.toggle('text-gray-500', t !== tab);
  });
  if (tab === 'history') loadHistory();
  if (tab === 'wechat')  loadWechatPanel();
  if (tab === 'prompts') loadPrompts();
}

async function apiFetch(path, opts = {}) {
  const res = await fetch(API + path, {
    headers: { 'Content-Type': 'application/json' },
    ...opts,
    body: opts.body !== undefined ? JSON.stringify(opts.body) : undefined,
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || '请求失败');
  return data;
}

function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// =================== 健康检查 ===================
async function checkHealth() {
  try {
    const d = await apiFetch('/api/health');
    const badge = document.getElementById('healthBadge');
    badge.textContent = ` 运行中 · ${d.activeTasks} 个定时任务`;
    badge.className = 'text-xs px-2 py-0.5 rounded-full bg-green-100 text-green-700';
  } catch {
    const badge = document.getElementById('healthBadge');
    badge.textContent = ' 服务离线';
    badge.className = 'text-xs px-2 py-0.5 rounded-full bg-red-100 text-red-600';
  }
}
checkHealth();
setInterval(checkHealth, 30000);

// =================== 快速爬取 + SSE 进度 ===================
const STEP_LABELS = {
  crawl:      ' 爬取',
  parse:      ' 解析',
  index:      ' 索引',
  analyst:    ' Analyst',
  critic:     ' Critic',
  strategist: ' Strategist',
  evolve:     ' 演化',
  done:       ' 完成',
  error:      ' 失败',
};
const STEPS_ORDER = ['crawl','parse','index','analyst','critic','strategist','evolve','done'];
const activeSessions = {};

function startCrawl() {
  const urls = document.getElementById('crawlUrls').value
    .split('\n').map(s => s.trim()).filter(Boolean);
  if (!urls.length) { alert('请输入至少一个链接'); return; }

  const btn = document.getElementById('crawlBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner mr-1"></span>爬取中...';

  apiFetch('/api/crawl', { method: 'POST', body: { urls } })
    .then(d => {
      showProgressPanel(d.sessionId, urls);
      connectSSE(d.sessionId, urls, btn);
    })
    .catch(e => {
      alert('请求失败: ' + e.message);
      btn.disabled = false;
      btn.innerHTML = ' 开始爬取';
    });
}

function showProgressPanel(sessionId, urls) {
  const panel = document.getElementById('progressPanel');
  panel.classList.remove('hidden');
  document.getElementById('reportLinks').classList.add('hidden');
  document.getElementById('reportLinkList').innerHTML = '??';
  const list = document.getElementById('progressList');
  list.innerHTML = '??';

  const urlEls = {};
  urls.forEach(url => {
    const short = url.length > 65 ? url.slice(0, 65) + '…' : url;
    const div = document.createElement('div');
    div.className = 'border rounded-lg p-3 bg-gray-50';
    div.innerHTML = `
      <div class="flex items-center gap-2 mb-2">
        <span class="w-2 h-2 rounded-full bg-gray-300 shrink-0 url-dot"></span>
        <span class="mono text-xs text-gray-400 truncate flex-1" title="${escapeHtml(url)}">${escapeHtml(short)}</span>
      </div>
      <div class="url-steps flex gap-1 flex-wrap"></div>
      <div class="url-msg text-xs text-gray-400 mt-1.5 h-4"></div>
    `;
    list.appendChild(div);
    urlEls[url] = div;

    const stepsEl = div.querySelector('.url-steps');
    STEPS_ORDER.forEach(s => {
      const chip = document.createElement('span');
      chip.id = `chip-${sessionId}-${btoa(url).replace(/=/g,'??').slice(0,10)}-${s}`;
      chip.className = 'chip chip-gray';
      chip.textContent = STEP_LABELS[s] || s;
      stepsEl.appendChild(chip);
    });
  });

  activeSessions[sessionId] = { urlEls };
}

function connectSSE(sessionId, urls, btn) {
  const es = new EventSource(`${API}/api/crawl/progress/${sessionId}`);
  const { urlEls } = activeSessions[sessionId];
  const reportPaths = [];
  let doneCount = 0;

  es.onmessage = e => {
    const d = JSON.parse(e.data);
    if (d.type === 'connected') return;

    const el = urlEls[d.url];
    if (!el) return;

    const keyPart = btoa(d.url).replace(/=/g,'??').slice(0,10);
    const idx = STEPS_ORDER.indexOf(d.step);

    // 之前步骤全部变绿
    STEPS_ORDER.slice(0, idx).forEach(s => {
      const c = document.getElementById(`chip-${sessionId}-${keyPart}-${s}`);
      if (c) { c.className = 'chip chip-green'; }
    });

    // 当前步骤
    const chip = document.getElementById(`chip-${sessionId}-${keyPart}-${d.step}`);
    if (chip) {
      if (d.step === 'error') chip.className = 'chip chip-red';
      else if (d.step === 'done') chip.className = 'chip chip-green';
      else chip.className = 'chip chip-blue';
    }

    const dot = el.querySelector('.url-dot');
    const msg = el.querySelector('.url-msg');
    msg.textContent = d.message;
    msg.className = 'url-msg text-xs mt-1.5 h-4 ' + (d.step === 'error' ? 'text-red-500' : 'text-gray-400');

    if (d.step === 'done') {
      dot.className = 'w-2 h-2 rounded-full bg-green-500 shrink-0 url-dot';
      if (d.reportPath) reportPaths.push(d.reportPath);
      doneCount++;
    } else if (d.step === 'error') {
      dot.className = 'w-2 h-2 rounded-full bg-red-500 shrink-0 url-dot';
      doneCount++;
    } else {
      dot.className = 'w-2 h-2 rounded-full bg-blue-400 shrink-0 url-dot';
    }

    if (doneCount >= urls.length) {
      es.close();
      btn.disabled = false;
      btn.innerHTML = ' 开始爬取';
      if (reportPaths.length) {
        document.getElementById('reportLinks').classList.remove('hidden');
        const ul = document.getElementById('reportLinkList');
        reportPaths.forEach(p => {
          const li = document.createElement('li');
          const fname = p.split(/[\\/]/).pop();
          li.innerHTML = `<span class="font-medium text-gray-700"> ${escapeHtml(fname)}</span>
            <span class="text-gray-400 text-xs ml-2 mono">${escapeHtml(p)}</span>`;
          ul.appendChild(li);
        });
      }
    }
  };

  es.onerror = () => {
    es.close();
    btn.disabled = false;
    btn.innerHTML = ' 开始爬取';
  };
}

// =================== 定时任务 ===================
function setIntervalVal(h) { document.getElementById('newInterval').value = h; }

async function loadTasks() {
  const el = document.getElementById('taskList');
  try {
    const { tasks } = await apiFetch('/api/tasks');
    if (!tasks.length) { el.innerHTML = '<p class="text-gray-400">暂无定时任务</p>'; return; }
    el.innerHTML = tasks.map(t => `
      <div class="border rounded-lg p-4 ${t.enabled ? 'border-blue-200 bg-blue-50/40' : 'bg-gray-50'}">
        <div class="flex items-center justify-between gap-3">
          <div class="flex items-center gap-2 min-w-0">
            <span class="w-2 h-2 rounded-full shrink-0 ${t.enabled ? 'bg-green-500' : 'bg-gray-400'}"></span>
            <span class="font-medium text-sm">每 ${t.intervalHours}h</span>
            <span class="text-xs text-gray-400">${t.urls.length} 个链接</span>
          </div>
          <div class="flex gap-1.5 shrink-0">
            <button onclick="runTask('${t.id}')"
              class="text-xs px-2.5 py-1 bg-blue-100 text-blue-700 rounded hover:bg-blue-200 transition">执行</button>
            <button onclick="toggleTask('${t.id}', ${!t.enabled})"
              class="text-xs px-2.5 py-1 rounded transition ${t.enabled
                ? 'bg-yellow-100 text-yellow-700 hover:bg-yellow-200'
                : 'bg-green-100 text-green-700 hover:bg-green-200'}">
              ${t.enabled ? '暂停' : '启用'}
            </button>
            <button onclick="deleteTask('${t.id}')"
              class="text-xs px-2.5 py-1 bg-red-100 text-red-600 rounded hover:bg-red-200 transition">删除</button>
          </div>
        </div>
        <details class="mt-2">
          <summary class="text-xs text-blue-500 cursor-pointer hover:underline">查看链接 · 上次 ${t.lastRunAt ? new Date(t.lastRunAt).toLocaleString('zh-CN') : '从未'} · 下次 ${t.nextRunAt ? new Date(t.nextRunAt).toLocaleString('zh-CN') : '-'}</summary>
          <ul class="mt-1.5 ml-2 space-y-0.5 mono text-xs text-gray-500">
            ${t.urls.map(u => `<li class="truncate" title="${escapeHtml(u)}">${escapeHtml(u)}</li>`).join('??')}
          </ul>
        </details>
      </div>
    `).join('??');
  } catch (e) { el.innerHTML = `<p class="text-red-500">加载失败: ${e.message}</p>`; }
}

async function createTask() {
  const intervalHours = parseFloat(document.getElementById('newInterval').value);
  const urls = document.getElementById('newUrls').value.split('\n').map(s => s.trim()).filter(Boolean);
  if (!urls.length) { alert('请输入链接'); return; }
  if (!intervalHours || intervalHours < 0.1) { alert('间隔最少 0.1 小时'); return; }
  await apiFetch('/api/tasks', { method: 'POST', body: { urls, intervalHours } });
  document.getElementById('newUrls').value = '??';
  loadTasks();
}

async function toggleTask(id, enabled) {
  await apiFetch(`/api/tasks/${id}`, { method: 'PUT', body: { enabled } });
  loadTasks();
}

async function runTask(id) {
  await apiFetch(`/api/tasks/${id}/run`, { method: 'POST' });
  alert('已开始执行，请在「执行历史」查看进度');
}

async function deleteTask(id) {
  if (!confirm('确认删除？')) return;
  await apiFetch(`/api/tasks/${id}`, { method: 'DELETE' });
  loadTasks();
}

// =================== 执行历史 ===================
async function loadHistory() {
  const el = document.getElementById('historyList');
  try {
    const { history } = await apiFetch('/api/history?limit=100');
    if (!history.length) { el.innerHTML = '<p class="text-gray-400">暂无执行历史</p>'; return; }
    const badge = {
      running: '<span class="chip chip-blue">运行中</span>',
      success: '<span class="chip chip-green">成功</span>',
      failed:  '<span class="chip chip-red">失败</span>',
    };
    el.innerHTML = history.map(h => `
      <div class="flex items-start gap-2.5 border-b border-gray-100 py-2 last:border-0">
        ${badge[h.status] || '??'}
        <div class="flex-1 min-w-0">
          <p class="mono text-xs text-gray-600 truncate" title="${escapeHtml(h.url)}">${escapeHtml(h.url)}</p>
          ${h.error  ? `<p class="text-xs text-red-400 mt-0.5">${escapeHtml(h.error)}</p>` : '??'}
          ${h.docId  ? `<p class="mono text-xs text-gray-400 mt-0.5">${h.docId}</p>` : '??'}
        </div>
        <span class="text-xs text-gray-400 shrink-0 whitespace-nowrap">
          ${new Date(h.startedAt).toLocaleString('zh-CN')}
        </span>
      </div>
    `).join('??');
  } catch (e) { el.innerHTML = `<p class="text-red-500">加载失败: ${e.message}</p>`; }
}
setInterval(loadHistory, 15000);

// =================== 微信公众平台订阅 ===================
let wechatStatusTimer = null;
let wechatSearchCache = [];

async function loadWechatPanel() {
  await refreshWechatStatus();
  await loadWechatSubscriptions();
}

async function refreshWechatStatus() {
  const statusEl = document.getElementById('wechatStatus');
  const btn = document.getElementById('wechatLoginBtn');
  const qrBox = document.getElementById('wechatQrBox');
  const qrImage = document.getElementById('wechatQrImage');
  const errEl = document.getElementById('wechatLoginError');

  try {
    const data = await apiFetch('/api/wechat/status');
    btn.disabled = !!data.login.running;
    btn.textContent = data.login.running ? '等待扫码...' : '生成登录二维码';
    errEl.textContent = data.login.error || '??';

    if (data.loggedIn) {
      const account = data.session?.account?.name ? ` · ${data.session.account.name}` : '??';
      statusEl.textContent = `已登录${account} · 更新于 ${new Date(data.session.updatedAt).toLocaleString('zh-CN')}`;
      statusEl.className = 'text-sm text-green-600 mt-1';
      qrBox.classList.add('hidden');
      if (wechatStatusTimer) clearInterval(wechatStatusTimer);
      wechatStatusTimer = null;
    } else if (data.login.running) {
      statusEl.textContent = '正在等待扫码确认...';
      statusEl.className = 'text-sm text-blue-600 mt-1';
      if (data.qrcodeExists) {
        qrImage.src = `/api/wechat/qrcode?t=${Date.now()}`;
        qrBox.classList.remove('hidden');
      }
    } else {
      statusEl.textContent = data.login.error ? `登录失败：${data.login.error}` : '未登录，请先生成二维码扫码授权';
      statusEl.className = data.login.error ? 'text-sm text-red-500 mt-1' : 'text-sm text-gray-400 mt-1';
      if (data.qrcodeExists && !data.login.error) {
        qrImage.src = `/api/wechat/qrcode?t=${Date.now()}`;
        qrBox.classList.remove('hidden');
      }
    }
  } catch (e) {
    statusEl.textContent = '状态读取失败：' + e.message;
    statusEl.className = 'text-sm text-red-500 mt-1';
  }
}

async function startWechatLogin() {
  document.getElementById('wechatLoginError').textContent = '??';
  document.getElementById('wechatQrBox').classList.remove('hidden');
  document.getElementById('wechatQrImage').removeAttribute('src');
  document.getElementById('wechatStatus').textContent = '正在生成新的登录二维码...';
  document.getElementById('wechatStatus').className = 'text-sm text-blue-600 mt-1';
  await apiFetch('/api/wechat/login', { method: 'POST' });
  await refreshWechatStatus();
  if (wechatStatusTimer) clearInterval(wechatStatusTimer);
  wechatStatusTimer = setInterval(refreshWechatStatus, 2000);
}

async function searchWechatBizUi() {
  const keyword = document.getElementById('wechatKeyword').value.trim();
  const box = document.getElementById('wechatSearchResults');
  if (!keyword) { alert('请输入公众号名称或关键词'); return; }
  box.innerHTML = '<span class="spinner mr-1"></span>搜索中...';
  try {
    const { results } = await apiFetch(`/api/wechat/search?q=${encodeURIComponent(keyword)}&limit=8`);
    if (!results.length) {
      box.innerHTML = '<p class="text-gray-400">未找到公众号</p>';
      return;
    }
    wechatSearchCache = results;
    box.innerHTML = results.map((item, index) => `
      <div class="border rounded-lg p-3 flex items-center justify-between gap-3 bg-gray-50">
        <div class="min-w-0">
          <p class="font-medium text-gray-800">${escapeHtml(item.nickname || item.fakeId)}</p>
          <p class="text-xs text-gray-400 mono truncate">fakeId: ${escapeHtml(item.fakeId)}</p>
          <p class="text-xs text-gray-500 truncate">${escapeHtml(item.signature || item.alias || '??')}</p>
        </div>
        <button onclick="subscribeWechat(${index})"
          class="shrink-0 px-3 py-1.5 bg-blue-600 text-white rounded-lg text-xs hover:bg-blue-700 transition">订阅</button>
      </div>
    `).join('??');
  } catch (e) {
    box.innerHTML = `<p class="text-red-500">搜索失败：${escapeHtml(e.message)}</p>`;
  }
}

async function subscribeWechat(index) {
  const item = wechatSearchCache[index];
  if (!item) return;
  await apiFetch('/api/wechat/subscriptions', {
    method: 'POST',
    body: {
      fakeId: item.fakeId,
      nickname: item.nickname || item.fakeId,
      alias: item.alias,
      roundHeadImg: item.roundHeadImg,
      serviceType: item.serviceType,
      signature: item.signature,
    },
  });
  await loadWechatSubscriptions();
}

async function loadWechatSubscriptions() {
  const box = document.getElementById('wechatSubscriptions');
  try {
    const { subscriptions } = await apiFetch('/api/wechat/subscriptions');
    if (!subscriptions.length) {
      box.innerHTML = '<p class="text-gray-400">暂无订阅</p>';
      return;
    }
    box.innerHTML = subscriptions.map(item => `
      <div class="border rounded-lg p-3 flex items-center justify-between gap-3">
        <div class="min-w-0">
          <p class="font-medium text-gray-800">${escapeHtml(item.nickname)}</p>
          <p class="text-xs text-gray-400 mono truncate">fakeId: ${escapeHtml(item.fakeId)}</p>
          <p class="text-xs text-gray-500 truncate">${escapeHtml(item.signature || item.alias || '??')}</p>
        </div>
        <button onclick="deleteWechatSubscription('${escapeHtml(item.fakeId)}')"
          class="shrink-0 px-3 py-1.5 bg-red-100 text-red-600 rounded-lg text-xs hover:bg-red-200 transition">删除</button>
      </div>
    `).join('??');
  } catch (e) {
    box.innerHTML = `<p class="text-red-500">订阅加载失败：${escapeHtml(e.message)}</p>`;
  }
}

async function deleteWechatSubscription(fakeId) {
  if (!confirm('确认删除这个订阅？')) return;
  await apiFetch(`/api/wechat/subscriptions/${encodeURIComponent(fakeId)}`, { method: 'DELETE' });
  await loadWechatSubscriptions();
}

async function syncWechatSubscriptions(urlsOnly) {
  const count = parseInt(document.getElementById('wechatSyncCount').value || '5', 10);
  const resultBox = document.getElementById('wechatSyncResults');
  const list = document.getElementById('wechatSyncList');
  resultBox.classList.remove('hidden');
  list.innerHTML = '<span class="spinner mr-1"></span>同步中...';
  try {
    const { synced } = await apiFetch('/api/wechat/sync', { method: 'POST', body: { count, urlsOnly } });
    if (!synced.length) {
      list.innerHTML = '<p class="text-gray-400">没有获取到文章</p>';
      return;
    }
    list.innerHTML = synced.map(item => `
      <div class="border rounded-lg p-2 bg-gray-50">
        <p class="font-medium text-gray-800">${escapeHtml(item.title || '(无标题)')}</p>
        <p class="mono text-gray-500 truncate">${escapeHtml(item.url)}</p>
        ${item.docId ? `<p class="text-green-600">已入库：${escapeHtml(item.docId)}</p>` : '??'}
        ${item.error ? `<p class="text-red-500">处理失败：${escapeHtml(item.error)}</p>` : '??'}
      </div>
    `).join('??');
  } catch (e) {
    list.innerHTML = `<p class="text-red-500">同步失败：${escapeHtml(e.message)}</p>`;
  }
}

// =================== Agent Prompts ===================
async function loadPrompts() {
  const el = document.getElementById('promptList');
  try {
    const { prompts } = await apiFetch('/api/prompts');
    renderPrompts(prompts);
  } catch (e) { el.innerHTML = `<p class="text-red-500">加载失败: ${e.message}</p>`; }
}

function renderPrompts(prompts) {
  document.getElementById('promptList').innerHTML = prompts.map(p => `
    <div class="border rounded-xl p-5" id="prompt-block-${p.id}">
      <div class="flex items-center justify-between mb-3">
        <div>
          <span class="font-semibold text-gray-800">${escapeHtml(p.name)}</span>
          <span class="ml-2 text-xs text-gray-400">${escapeHtml(p.description)}</span>
        </div>
        <div class="flex gap-2">
          <button onclick="savePromptItem('${p.id}')"
            class="text-xs px-3 py-1.5 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">
             保存
          </button>
          <button onclick="resetPromptItem('${p.id}')"
            class="text-xs px-3 py-1.5 bg-gray-100 text-gray-600 rounded-lg hover:bg-gray-200 transition">
             还原默认
          </button>
        </div>
      </div>
      <textarea id="prompt-ta-${p.id}"
        class="mono w-full border rounded-lg p-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 resize-y bg-gray-50"
        rows="12">${escapeHtml(p.systemPrompt)}</textarea>
      <p id="prompt-msg-${p.id}" class="text-xs mt-1 h-4 text-gray-400"></p>
    </div>
  `).join('??');
}

async function savePromptItem(id) {
  const ta  = document.getElementById(`prompt-ta-${id}`);
  const msg = document.getElementById(`prompt-msg-${id}`);
  if (!ta.value.trim()) { msg.textContent = '内容不能为空'; msg.className = 'text-xs mt-1 h-4 text-red-500'; return; }
  try {
    await apiFetch(`/api/prompts/${id}`, { method: 'PUT', body: { systemPrompt: ta.value } });
    msg.textContent = ' 已保存';
    msg.className = 'text-xs mt-1 h-4 text-green-600';
    setTimeout(() => { msg.textContent = '??'; msg.className = 'text-xs mt-1 h-4 text-gray-400'; }, 2500);
  } catch(e) {
    msg.textContent = '保存失败: ' + e.message;
    msg.className = 'text-xs mt-1 h-4 text-red-500';
  }
}

async function resetPromptItem(id) {
  if (!confirm('确认还原为默认 Prompt？')) return;
  try {
    const { prompts } = await apiFetch(`/api/prompts/${id}/reset`, { method: 'POST' });
    renderPrompts(prompts);
  } catch(e) {
    alert('还原失败: ' + e.message);
  }
}
</script>
